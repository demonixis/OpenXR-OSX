name: pr-apple-builds

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  apple-build:
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: home
            script: scripts/ci/build-home.sh
          - name: simulator
            script: scripts/ci/build-simulator.sh
          - name: visionos
            script: scripts/ci/build-visionos.sh
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      - name: Build ${{ matrix.name }}
        run: ${{ matrix.script }}
